<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Honours &amp; Awards — Srinivasulu IFS</title>
    <meta
      name="description"
      content="Awards and recognitions received by Srinivasulu IFS — including Guinness World Records, Asia Book of Records, and state honours."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+Kannada:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="design-system.css" />
    <style>
      .award-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: var(--s-4);
      }

      @media (max-width: 1024px) {
        .award-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 640px) {
        .award-grid {
          grid-template-columns: 1fr;
        }
      }

      .award-grid > * {
        margin-bottom: 0;
      }

      .award-tile {
        position: relative;
        display: block;
        border-radius: var(--r-md);
        overflow: hidden;
        background: var(--paper-2);
        cursor: pointer;
        transition:
          transform var(--d),
          box-shadow var(--d);
      }
      .award-tile:hover {
        transform: translateY(-3px);
        box-shadow: var(--e2);
      }
      .award-tile img {
        width: 100%;
        display: block;
      }
      .award-year {
        position: absolute;
        top: 12px;
        left: 12px;
        background: rgba(15, 26, 20, 0.82);
        color: #fff;
        padding: 4px 8px;
        border-radius: var(--r-xs);
        font-family: var(--f-mono);
        font-size: var(--t-12);
        font-weight: 600;
        backdrop-filter: blur(6px);
      }
      .award-tag {
        position: absolute;
        top: 12px;
        right: 12px;
      }
      .award-overlay {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: var(--s-4);
        background: linear-gradient(
          180deg,
          transparent,
          rgba(15, 26, 20, 0.85)
        );
        color: #fff;
        opacity: 0;
        transform: translateY(8px);
        transition:
          opacity var(--d),
          transform var(--d);
      }
      .award-tile:hover .award-overlay,
      .award-tile:focus-visible .award-overlay {
        opacity: 1;
        transform: translateY(0);
      }
      .award-overlay h4 {
        color: #fff;
        font-size: var(--t-16);
        line-height: 1.3;
      }
      .award-overlay .meta {
        font-size: var(--t-12);
        color: #d8d2c0;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <div id="sr-chrome-top"></div>

    <main id="main">
      <section class="page-hero">
        <div class="container reveal">
          <div class="breadcrumb">
            <a href="index.html">Home</a>
            <i data-lucide="chevron-right" class="icon-sm"></i>
            <span>Honours &amp; Awards</span>
          </div>
          <h1>Honours and Awards</h1>
          <p class="lede">
            International, national and state recognition for forest
            conservation, wildlife management, environmental policy and
            academic distinction.
          </p>

          <div class="page-hero-stats">
            <div class="page-hero-stat">
              <div class="num">25</div>
              <div class="lbl">Total honours</div>
            </div>
            <div class="page-hero-stat">
              <div class="num">2002–2025</div>
              <div class="lbl">Span</div>
            </div>
            <div class="page-hero-stat">
              <div class="num">4</div>
              <div class="lbl">International</div>
            </div>
          </div>
        </div>
      </section>

      <!-- Filters -->
      <div class="filter-bar">
        <div
          class="container"
          style="
            display: flex;
            gap: var(--s-4);
            align-items: center;
            width: 100%;
            flex-wrap: wrap;
          "
        >
          <div class="filter-chips" id="filterChips">
            <button class="chip is-active" data-filter="all">All</button>
            <button class="chip" data-filter="international">
              International
            </button>
            <button class="chip" data-filter="national">National</button>
            <button class="chip" data-filter="state">State</button>
            <button class="chip" data-filter="academic">Academic</button>
          </div>
          <div class="filter-tools">
            <select class="chip" id="sortSelect" aria-label="Sort">
              <option value="newest">Newest first</option>
              <option value="oldest">Oldest first</option>
            </select>
          </div>
        </div>
      </div>

      <section class="section">
        <div class="container">
          <div class="award-grid" id="awardGrid" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <!-- Award modal -->
    <div class="scrim" id="awardScrim"></div>
    <aside
      class="drawer"
      id="awardModal"
      role="dialog"
      aria-modal="true"
      aria-label="Award details"
      style="width: min(640px, 92vw)"
    >
      <div class="drawer-head">
        <div class="drawer-head-text">
          <h2 id="amTitle">—</h2>
          <div class="meta" id="amMeta">—</div>
        </div>
        <button class="drawer-close" id="amClose" aria-label="Close">
          <i data-lucide="x"></i>
        </button>
      </div>
      <div class="drawer-body">
        <img
          id="amImg"
          alt=""
          style="
            width: 100%;
            border-radius: var(--r-md);
            margin-bottom: var(--s-5);
          "
        />
        <p id="amBody" style="color: var(--ink-2); line-height: 1.7"></p>
        <div style="display: flex; gap: 8px; margin-top: var(--s-5)">
          <button class="btn btn-outline btn-sm" id="amShare">
            <i data-lucide="share-2" class="icon-sm"></i> Share
          </button>
          <a class="btn btn-outline btn-sm" id="amDownload" href="#" download
            ><i data-lucide="download" class="icon-sm"></i> Certificate</a
          >
        </div>
      </div>
    </aside>

    <div id="sr-chrome-footer"></div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="chrome.js"></script>
    <script src="app.js"></script>
    <script>
      // Awards data (newest first)
      const AWARDS = [
        {
          year: 2022,
          cat: "international",
          title: "Guinness World Record",
          body: "The most people sculpting with modelling clay simultaneously.",
          img: "./images/honours/IMG_2176.HEIC.webp"
        },
        {
          year: 2022,
          cat: "international",
          title: "Guinness World Records",
          body: "The largest Online photo album of handmade sculpture.",
          img: "./images/honours/gwr2021.webp"
        },
        {
          year: 2022,
          cat: "state",
          title: "H. V. Muniswamy Gowda Environment Award",
          body: "Awarded for contribution to environmental protection.",
          img: "./images/honours/hvmgeAward.webp"
        },
        {
          year: 2021,
          cat: "international",
          title: "Asia Book of Records",
          body: "Largest number of eco-friendly turmeric Ganesh idols.",
          img: "./images/honours/AsiaBookofRecords.webp"
        },
        {
          year: 2017,
          cat: "state",
          title: "Kalyana Mobile App Launch",
          body: "Citizen service app launched during Dr. B.R. Ambedkar International Conference.",
          img: "./images/honours/AC4.webp"
        },
        {
          year: 2016,
          cat: "national",
          title: "Best Tourism Award by FKCCI",
          body: "For promoting tourism in Dandeli.",
          img: "./images/honours/fkcci.webp"
        },
        {
          year: 2016,
          cat: "national",
          title: "Dr. Chuck McDougal Memorial Award (Runner-up)",
          body: "TOFT Wildlife Tourism Awards.",
          img: "./images/honours/fkcci.webp"
        },
        {
          year: 2016,
          cat: "national",
          title: "Holiday IQ Award – Kali Tiger Reserve",
          body: "Best tourism and hospitality activities.",
          img: "./images/honours/fkcci.webp"
        },
        {
          year: 2016,
          cat: "state",
          title: "State Environment Award",
          body: "Conferred by the Chief Minister of Karnataka.",
          img: "./images/honours/AC3.webp"
        },
      ];

      const grid = document.getElementById("awardGrid");
      const chips = document.querySelectorAll("#filterChips .chip");
      const sortSel = document.getElementById("sortSelect");

      let filter = "all",
        sortOrder = "newest";

      function render() {
        let list = AWARDS.slice();
        if (filter !== "all") list = list.filter((a) => a.cat === filter);
        list.sort((a, b) =>
          sortOrder === "newest" ? b.year - a.year : a.year - b.year,
        );
        grid.innerHTML = list
          .map(
            (a, i) => `
    <button class="award-tile" data-i="${AWARDS.indexOf(a)}" aria-label="${a.title}, ${a.year}">
      <img src="${a.img}" alt="${a.title}" loading="lazy">
      <span class="award-year">${a.year}</span>
      <span class="award-tag tag tag-dark">${a.cat}</span>
      <div class="award-overlay">
        <h4>${a.title}</h4>
        <div class="meta">${a.body}</div>
      </div>
    </button>
  `,
          )
          .join("");
        window.SrIcons && window.SrIcons();

        grid.querySelectorAll(".award-tile").forEach((el) => {
          el.addEventListener("click", () => openModal(AWARDS[el.dataset.i]));
        });
      }

      chips.forEach((c) =>
        c.addEventListener("click", () => {
          chips.forEach((x) => x.classList.remove("is-active"));
          c.classList.add("is-active");
          filter = c.dataset.filter;
          render();
        }),
      );
      sortSel.addEventListener("change", (e) => {
        sortOrder = e.target.value;
        render();
      });

      // Modal
      const modal = document.getElementById("awardModal");
      const scrim = document.getElementById("awardScrim");
      function openModal(a) {
        document.getElementById("amTitle").textContent = a.title;
        document.getElementById("amMeta").textContent = a.year + " · " + a.cat;
        document.getElementById("amImg").src = a.img;
        document.getElementById("amBody").textContent = a.body;
        document.getElementById("amDownload").href = a.img;
        modal.classList.add("is-open");
        scrim.classList.add("is-open");
        document.body.style.overflow = "hidden";
      }
      function closeModal() {
        modal.classList.remove("is-open");
        scrim.classList.remove("is-open");
        document.body.style.overflow = "";
      }
      document.getElementById("amClose").addEventListener("click", closeModal);
      scrim.addEventListener("click", closeModal);
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
      });
      document.getElementById("amShare").addEventListener("click", () => {
        const t = document.getElementById("amTitle").textContent;
        window.SrShare(t, location.href);
      });

      render();
    </script>
  </body>
</html>
