<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Publications — Srinivasulu IFS</title>
  <meta name="description" content="Reports, policy documents and publications across departments.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+Kannada:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="design-system.css">
  <style>
    .pub-card{
      background:var(--surface); border:1px solid var(--line); border-radius:var(--r-sm);
      padding:var(--s-3); display:grid; grid-template-columns:80px 1fr; gap:var(--s-4);
      margin-bottom:var(--s-3); transition:border-color var(--d-fast);
      text-decoration:none; color:inherit;
    }
    .pub-card:hover{ border-color:var(--brand); }
    .pub-cover{ aspect-ratio:3/4; background:var(--paper-2); border-radius:var(--r-xs); overflow:hidden; }
    .pub-cover img{ width:100%; height:100%; object-fit:cover; }
    .pub-body{ display:flex; flex-direction:column; }
    .pub-title{ font-family:var(--f-display); font-size:var(--t-16); font-weight:600; line-height:1.3; margin-bottom:4px; color:var(--ink); }
    .pub-meta{ font-size:var(--t-12); color:var(--ink-3); display:flex; gap:8px; flex-wrap:wrap; margin-bottom:6px; }
    .pub-actions{ display:flex; gap:6px; margin-top:auto; }
    .pub-actions .btn{ height:30px; padding:0 12px; font-size:var(--t-12); }

    /* Compact grid overrides for 6 columns and fitting in view without scrolling */
    .page-hero {
      padding: var(--s-3) 0 !important;
    }
    .page-hero h1 {
      font-size: var(--t-24) !important;
      margin-bottom: var(--s-1) !important;
    }
    .page-hero .breadcrumb {
      margin-bottom: var(--s-1) !important;
    }
    .page-hero-stat {
      display: flex;
      align-items: baseline;
      gap: var(--s-2);
    }
    .page-hero-stat .num {
      font-size: var(--t-20) !important;
    }
    .page-hero-stat .lbl {
      font-size: var(--t-12) !important;
      margin-top: 0 !important;
    }
    .section {
      padding: var(--s-3) 0 !important;
    }
    .dept-grid {
      grid-template-columns: repeat(6, 1fr) !important;
      gap: var(--s-3) !important;
    }
    .dept-card {
      padding: var(--s-2) !important;
      min-height: 180px !important;
      justify-content: center !important;
      align-items: center !important;
      text-align: center !important;
    }
    .dept-logo {
      width: 72px !important;
      height: 72px !important;
      margin-bottom: var(--s-2) !important;
      padding: 2px !important;
    }
    .dept-card h3 {
      font-size: var(--t-12) !important;
      margin-bottom: 0 !important;
      font-weight: 500 !important;
      line-height: 1.25 !important;
    }
    .dept-meta {
      display: none !important;
    }
    .dept-arrow {
      display: none !important;
    }
    .dept-card:hover {
      transform: none !important;
    }
    @media (max-width: 1024px) {
      .dept-grid { grid-template-columns: repeat(6, 1fr) !important; }
      .dept-card { min-height: 140px !important; }
      .dept-logo { width: 44px !important; height: 44px !important; }
    }
    @media (max-width: 820px) {
      .dept-grid { grid-template-columns: repeat(4, 1fr) !important; } /* 3 rows on small tablets */
    }
    @media (max-width: 600px) {
      .dept-grid { grid-template-columns: repeat(3, 1fr) !important; }
    }
    @media (max-width: 400px) {
      .dept-grid { grid-template-columns: repeat(2, 1fr) !important; }
    }
  </style>
</head>
<body>

<a class="skip-link" href="#main">Skip to content</a>
<div id="sr-chrome-top"></div>

<main id="main">

  <section class="page-hero">
    <div class="container reveal">
      <div class="breadcrumb"><a href="index.html">Home</a> <i data-lucide="chevron-right" class="icon-sm"></i> <span>Publications</span></div>
      <h1>Publications</h1>
      <div style="display:flex; gap:var(--s-3); margin-top:var(--s-6); flex-wrap:wrap;">
        <div class="search-input" style="flex:1; max-width:420px;">
          <i data-lucide="search" class="icon-sm"></i>
          <input id="deptSearch" type="search" placeholder="Search publications…">
        </div>
        <div class="page-hero-stat" style="margin-left:auto;"><div class="num">100+</div><div class="lbl">Documents on record</div></div>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="dept-grid" id="deptGrid"></div>
    </div>
  </section>

</main>

<div id="sr-chrome-footer"></div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="chrome.js"></script>
<script src="app.js"></script>
<script>
window.addEventListener('load', () => {
  const data = window.SR_DEPTS_CV || [];
  const logos = window.SR_LOGOS || {};
  const grid = document.getElementById('deptGrid');

  function render(filter){
    const q = (filter || '').toLowerCase().trim();
    const list = q ? data.filter(d => d.name.toLowerCase().includes(q) || d.kind.toLowerCase().includes(q)) : data;
    if (!list.length){
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><i data-lucide="search-x"></i><p>No departments match.</p></div>';
      window.SrIcons && window.SrIcons(); return;
    }
    grid.innerHTML = list.map(d => `
      <button class="dept-card" data-slug="${d.slug}" aria-label="${d.name}">
        <img class="dept-logo" src="${logos[d.slug] || ''}" alt="" loading="lazy">
        <h3>${d.name}</h3>
      </button>
    `).join('');
    window.SrIcons && window.SrIcons();
    grid.querySelectorAll('.dept-card').forEach(c => c.addEventListener('click', () => openDept(c.dataset.slug)));
  }
  document.getElementById('deptSearch').addEventListener('input', e => render(e.target.value));
  render();

  // Sample publications data per dept (replace with real list later)
  function getPubs(slug){
    const base = [
      { title:'Annual Report 2024',         year:2024, type:'Report',   pages:84,  size:'2.4 MB', lang:'EN', cover:'https://images.unsplash.com/photo-1457369804613-52c61a468e7d?w=400' },
      { title:'Policy Brief · Wildlife',    year:2023, type:'Policy',   pages:24,  size:'480 KB', lang:'EN', cover:'https://images.unsplash.com/photo-1568992687947-868a62a9f521?w=400' },
      { title:'ತಾಂತ್ರಿಕ ವರದಿ · ೨೦೨೩',         year:2023, type:'Technical',pages:120, size:'5.1 MB', lang:'KN', cover:'https://images.unsplash.com/photo-1521336575822-6da63fb45455?w=400' },
      { title:'Research Paper · Biodiversity',year:2022, type:'Research', pages:18, size:'320 KB', lang:'EN', cover:'https://images.unsplash.com/photo-1574482620811-1aa16ffe3c82?w=400' },
      { title:'Departmental Brochure',      year:2021, type:'Brochure', pages:12,  size:'1.8 MB', lang:'EN', cover:'https://images.unsplash.com/photo-1599689019338-b97a78cd86e9?w=400' }
    ];
    return base;
  }

  function openDept(slug){
    const d = data.find(x => x.slug === slug);
    if (!d) return;
    const logo = logos[slug];
    const pubs = getPubs(slug).sort((a,b) => b.year - a.year);

    const url = new URL(location.href);
    url.searchParams.set('dept', slug);
    history.replaceState(null,'',url);

    const pubHtml = pubs.map(p => `
      <a class="pub-card" href="#">
        <div class="pub-cover"><img src="${p.cover}" alt=""></div>
        <div class="pub-body">
          <div class="pub-title">${p.title}</div>
          <div class="pub-meta">
            <span class="lang-flag ${p.lang.toLowerCase()}">${p.lang}</span>
            <span>${p.type}</span>
            <span>·</span>
            <span>${p.year}</span>
            <span>·</span>
            <span>${p.pages}pp</span>
            <span>·</span>
            <span>${p.size}</span>
          </div>
          <div class="pub-actions">
            <button class="btn btn-outline btn-sm"><i data-lucide="eye" class="icon-sm"></i> Preview</button>
            <button class="btn btn-ghost btn-sm"><i data-lucide="download" class="icon-sm"></i> Download</button>
          </div>
        </div>
      </a>`).join('');

    const html = `
      <header class="drawer-head">
        <img class="drawer-head-logo" src="${logo||''}" alt="">
        <div class="drawer-head-text">
          <h2>${d.name}</h2>
          <div class="meta">${d.period} · ${pubs.length} documents</div>
        </div>
        <button class="drawer-close" aria-label="Close"><i data-lucide="x"></i></button>
      </header>
      <div class="drawer-tabs">
        <button class="tab is-active" data-target="dc-${slug}">Documents</button>
        <button class="tab" data-target="info-${slug}">About</button>
      </div>
      <div class="drawer-body">
        <section class="tab-panel is-active" id="dc-${slug}">
          <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:var(--s-4);">
            <button class="chip is-active">All types</button>
            <button class="chip">Report</button>
            <button class="chip">Policy</button>
            <button class="chip">Research</button>
            <button class="chip">Brochure</button>
          </div>
          ${pubHtml}
        </section>
        <section class="tab-panel" id="info-${slug}">
          <p style="color:var(--ink-2);line-height:1.7;">Service period: <strong>${d.period}</strong>. Role: <strong>${d.kind}</strong>. Related posts available on the <a href="accomplishments.html?dept=${slug}" style="color:var(--brand);">Accomplishments page</a>.</p>
        </section>
      </div>
    `;
    DeptDrawer.open(html);
  }

  const params = new URLSearchParams(location.search);
  const depParam = params.get('dept');
  if (depParam) setTimeout(() => openDept(depParam), 200);
});
</script>
</body>
</html>
